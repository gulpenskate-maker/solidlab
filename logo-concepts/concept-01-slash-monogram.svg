<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>
    .stroke { fill: none; stroke: #0A0A0A; stroke-width: 14; stroke-linecap: square; }
  </style>
  <!-- S-form, integrerer slash -->
  <path d="M 60 60 L 140 60 M 60 60 L 60 100 L 140 100 M 140 100 L 140 140 L 60 140" class="stroke"/>
  <!-- The slash diagonal, crossing through, marking identity -->
  <line x1="40" y1="170" x2="160" y2="30" stroke="#4A5A62" stroke-width="6" stroke-linecap="square"/>
</svg>
