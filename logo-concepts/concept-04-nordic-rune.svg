<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>
    .stroke { fill: none; stroke: #0A0A0A; stroke-width: 12; stroke-linecap: square; stroke-linejoin: miter; }
  </style>
  <!-- Vertikal stamme -->
  <line x1="100" y1="30" x2="100" y2="170" class="stroke"/>
  <!-- Horisontale grener som danner S+L -->
  <line x1="60" y1="60" x2="100" y2="60" class="stroke"/>
  <line x1="100" y1="100" x2="140" y2="100" class="stroke"/>
  <line x1="60" y1="140" x2="140" y2="140" class="stroke"/>
</svg>
