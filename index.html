<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<script>
  // Theme initialization — runs before any render to prevent flash
  (function() {
    try {
      var saved = localStorage.getItem("solidlab-theme");
      if (saved === "light" || saved === "dark") {
        document.documentElement.setAttribute("data-theme", saved);
      } else {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Solidlab — A Nordic Venture Studio</title>
<meta name="description" content="Solidlab is a Nordic venture studio for builders and backers. We build solid products for our own ventures — and for the clients who want us to build the same for them."/>
<meta name="theme-color" content="#1F1F1F"/>

<!-- Open Graph -->

<!-- Weglot — translation layer (EN source → NO/SE/DK)
     Note: Dynamic content (React-rendered) requires adding "body" as a
     Dynamic selector in Weglot dashboard → Settings → App Settings → Add Dynamic -->
<script type="text/javascript" src="https://cdn.weglot.com/weglot.min.js"></script>
<script>
  Weglot.initialize({
    api_key: 'wg_b25ee1a0ed399a9be118ba69f69de68a5',
    switchers: [
      {
        style: {
          full_name: false,
          with_name: true,
          is_dropdown: true,
          with_flags: false,
          flag_type: ""
        },
        location: {
          target: ".sl-header__inner",
          sibling: null
        }
      }
    ]
  });
</script>

<!-- Weglot brand override — loaded AFTER Weglot's own stylesheet for priority -->
<style id="weglot-brand-override">
  /* Neutralize Weglot default chrome */
  .weglot-container .weglot_switcher,
  .weglot-container .weglot_switcher .wg-li.wgcurrent,
  .weglot-container .weglot_switcher ul[role="listbox"] {
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    min-height: 0 !important;
  }
  .weglot-container .weglot_switcher .wg-li.wgcurrent {
    border: 1px solid var(--border-dark) !important;
    padding: 8px 14px !important;
    background: transparent !important;
    min-width: 0 !important;
    display: inline-flex !important;
    align-items: center !important;
    line-height: 1 !important;
  }
  html[data-theme="light"] .weglot-container .weglot_switcher .wg-li.wgcurrent {
    border-color: var(--border-light) !important;
  }
  .weglot-container .weglot_switcher .wg-li.wgcurrent:hover {
    border-color: var(--oslo) !important;
  }
  /* Links — mono, uppercase, brand color */
  .weglot-container .weglot_switcher .wg-li a,
  .weglot-container .weglot_switcher .wg-li a:visited {
    font-family: var(--font-mono) !important;
    font-size: 11px !important;
    font-weight: 400 !important;
    letter-spacing: 0.08em !important;
    text-transform: uppercase !important;
    color: var(--mist) !important;
    text-decoration: none !important;
    padding: 0 !important;
    line-height: 1 !important;
    background: none !important;
  }
  /* Slash prefix on current language (matches nav brand style) */
  .weglot-container .weglot_switcher .wg-li.wgcurrent a::before {
    content: "/ ";
    color: var(--mist);
    margin-right: 2px;
  }
  .weglot-container .weglot_switcher .wg-li.wgcurrent a {
    color: var(--antikkhvit) !important;
  }
  html[data-theme="light"] .weglot-container .weglot_switcher .wg-li.wgcurrent a {
    color: var(--sort) !important;
  }
  html[data-theme="light"] .weglot-container .weglot_switcher .wg-li.wgcurrent a::before {
    color: var(--fog) !important;
  }
  /* Dropdown list */
  .weglot-container .weglot_switcher ul[role="listbox"] {
    background: var(--sort) !important;
    border: 1px solid var(--border-dark) !important;
    border-top: none !important;
    padding: 0 !important;
    margin-top: 0 !important;
    min-width: 100% !important;
  }
  html[data-theme="light"] .weglot-container .weglot_switcher ul[role="listbox"] {
    background: var(--antikkhvit) !important;
    border-color: var(--border-light) !important;
  }
  .weglot-container .weglot_switcher ul[role="listbox"] li {
    padding: 7px 10px !important;
    background: transparent !important;
    transition: background 150ms ease;
  }
  .weglot-container .weglot_switcher ul[role="listbox"] li:hover {
    background: rgba(74, 90, 98, 0.2) !important;
  }
  .weglot-container .weglot_switcher ul[role="listbox"] li:hover a {
    color: var(--antikkhvit) !important;
  }
  html[data-theme="light"] .weglot-container .weglot_switcher ul[role="listbox"] li:hover a {
    color: var(--sort) !important;
  }
  /* Dropdown arrow */
  .weglot-container .weglot_switcher.wg-drop.closed:after,
  .weglot-container .weglot_switcher.wg-drop:after {
    border-color: var(--mist) transparent transparent transparent !important;
    right: 10px !important;
    top: 45% !important;
  }
  /* Hide flags, just in case */
  .weglot-container .weglot_switcher .wg-flag,
  .weglot-container .weglot_switcher img[class*="flag"] {
    display: none !important;
  }
  /* Watermark — dim */
  .wg-switcher-watermark {
    opacity: 0.3 !important;
    padding: 4px 0 !important;
  }
  .wg-switcher-watermark a {
    font-size: 9px !important;
    color: var(--mist) !important;
  }
  /* Align inside header — switcher should be inline with other header items */
  .sl-header__inner .weglot-container,
  .sl-nav .weglot-container {
    display: inline-flex !important;
    align-items: center !important;
    margin-left: 8px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="surfaces.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [view, setView] = useState("home"); // home | work | about | contact | investors | case | detail
  const [detail, setDetail] = useState(null);

  const nav = (k) => {
    if (k === "home") { setView("home"); setDetail(null); }
    else if (k === "work") { setView("home"); setDetail(null); } /* work hidden until ready — redirect to home */
    else if (k === "about") { setView("about"); setDetail(null); }
    else if (k === "contact") { setView("contact"); setDetail(null); }
    else if (k === "investors") { setView("investors"); setDetail(null); }
    else if (k === "technology") { setView("technology"); setDetail(null); }
    else if (k === "ai") { setView("ai"); setDetail(null); }
    else if (k === "writing") { setView("home"); }
    window.scrollTo({top:0, behavior:"smooth"});
  };

  const selectWork = (k) => {
    /* disabled — Work section hidden until first real case study is ready */
    setView("home");
    window.scrollTo({top:0});
  };

  return (
    <>
      <Header current={view === "detail" ? "work" : view === "home" ? null : view} onNav={nav}/>
      {view === "home" && (
        <>
          <Hero onNav={nav}/>
          <WhatWeDo/>
          <Advisory onNav={nav}/>
          <Technology onNav={nav}/>
          <About/>
          <Contact/>
        </>
      )}
      {view === "about" && (
        <AboutPage/>
      )}
      {view === "contact" && (
        <ContactPage/>
      )}
      {view === "investors" && (
        <InvestorsPage/>
      )}
      {view === "technology" && (
        <TechnologyPage onNav={nav}/>
      )}
      {view === "ai" && (
        <AIPage onNav={nav}/>
      )}
      <Footer onNav={nav}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
