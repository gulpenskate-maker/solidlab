<script>
  // Theme initialization — runs before any render to prevent flash
  (function() {
    try {
      var saved = localStorage.getItem("solidlab-theme");
      if (saved === "light" || saved === "dark") {
        document.documentElement.setAttribute("data-theme", saved);
      } else {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  })();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const [view, setView] = useState("home"); // home | work | about | contact | investors | case | detail
  const [detail, setDetail] = useState(null);

  const nav = (k) => {
    if (k === "home") { setView("home"); setDetail(null); }
    else if (k === "work") { setView("work"); setDetail(null); }
    else if (k === "about") { setView("about"); setDetail(null); }
    else if (k === "contact") { setView("contact"); setDetail(null); }
    else if (k === "investors") { setView("investors"); setDetail(null); }
    else if (k === "writing") { setView("home"); }
    window.scrollTo({top:0, behavior:"smooth"});
  };

  const selectWork = (k) => {
    const item = WORK_ITEMS.find(w => w.k === k);
    setDetail(item);
    setView("detail");
    window.scrollTo({top:0});
  };

  return (
    <>
      <Header current={view === "detail" ? "work" : view === "home" ? null : view} onNav={nav}/>
      {view === "home" && (
        <>
          <Hero onNav={nav}/>
          <WhatWeDo/>
          <Work onSelect={selectWork}/>
          <About/>
          <Contact/>
        </>
      )}
      {view === "work" && (
        <>
          <Work onSelect={selectWork}/>
          <Contact/>
        </>
      )}
      {view === "about" && (
        <AboutPage/>
      )}
      {view === "contact" && (
        <ContactPage/>
      )}
      {view === "investors" && (
        <InvestorsPage/>
      )}
      {view === "case" && (
        <CaseStudy data={SAMPLE_CASE} onBack={() => { setView("work"); window.scrollTo({top:0}); }} onNext={() => { window.scrollTo({top:0}); }}/>
      )}
      {view === "detail" && (
        <Detail item={detail} onBack={() => { setView("work"); setDetail(null); window.scrollTo({top:0}); }} />
      )}
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
